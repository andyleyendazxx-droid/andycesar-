<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-bottom: 15px;
        }

        button:active {
            background-color: #2980b9;
        }

        button.scanning {
            background-color: #e74c3c;
        }

        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        /* Estilizar los bordes internos que genera la librería */
        #reader video {
            border-radius: 8px;
        }

        h2 {
            font-size: 18px;
            color: #2c3e50;
            margin-top: 15px;
            margin-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }

        .historial-container {
            max-height: 250px;
            overflow-y: auto;
        }

        .qr-item {
            background: #f8f9fa;
            border-left: 4px solid #2ecc71;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
            font-size: 14px;
            word-break: break-all;
        }

        .qr-item .meta {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 5px;
            display: block;
        }

        .no-data {
            text-align: center;
            color: #95a5a6;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Escáner de Códigos QR</h1>
    </header>

    <div class="container">
        <button id="btn-scan">Iniciar Cámara</button>
        
        <div id="reader" style="display: none;"></div>

        <h2>Registros Guardados</h2>
        <div class="historial-container" id="historial">
            <p class="no-data">No hay códigos escaneados aún.</p>
        </div>
    </div>

    <script>
        const btnScan = document.getElementById('btn-scan');
        const readerDiv = document.getElementById('reader');
        const historialDiv = document.getElementById('historial');
        
        let html5QrCode;
        let isScanning = false;

        // Cargar datos previamente guardados en el dispositivo al iniciar
        document.addEventListener('DOMContentLoaded', mostrarHistorial);

        btnScan.addEventListener('click', () => {
            if (!isScanning) {
                encenderCamara();
            } else {
                apagarCamara();
            }
        });

        function encenderCamara() {
            readerDiv.style.display = 'block';
            btnScan.textContent = 'Apagar Cámara';
            btnScan.classList.add('scanning');
            isScanning = true;

            // Inicializar la librería en el contenedor #reader
            html5QrCode = new Html5Qrcode("reader");

            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 } 
            };

            // 'environment' le indica que use la cámara trasera en dispositivos móviles
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Error al iniciar la cámara:", err);
                alert("No se pudo acceder a la cámara. Asegúrate de dar los permisos necesarios.");
                apagarCamara();
            });
        }

        function apagarCamara() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    readerDiv.style.display = 'none';
                    btnScan.textContent = 'Iniciar Cámara';
                    btnScan.classList.remove('scanning');
                    isScanning = false;
                }).catch(err => console.error("Error al detener la cámara:", err));
            }
        }

        // Esta función se ejecuta automáticamente cuando detecta un QR válido
        function onScanSuccess(decodedText, decodedResult) {
            // Detener la cámara inmediatamente después del éxito (opcional, para feedback visual)
            apagarCamara();
            
            // Vibración sutil si el dispositivo lo soporta
            if (navigator.vibrate) navigator.vibrate(200);

            // Guardar en almacenamiento local
            guardarRegistro(decodedText);
        }

        function onScanFailure(error) {
            // Esta función se ejecuta continuamente buscando códigos. 
            // La dejamos vacía para evitar saturar la consola de errores de lectura.
        }

        function guardarRegistro(texto) {
            const ahora = new Date();
            
            // Formatear la fecha y hora de manera legible
            const fechaHora = ahora.toLocaleString('es-ES', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            const nuevoRegistro = {
                datos: texto,
                fecha: fechaHora
            };

            // Obtener registros existentes de LocalStorage o crear un arreglo vacío
            let historial = JSON.parse(localStorage.getItem('qr_history')) || [];
            
            // Agregar al inicio para que el más reciente aparezca arriba
            historial.unshift(nuevoRegistro);
            
            // Guardar de vuelta en LocalStorage
            localStorage.setItem('qr_history', JSON.stringify(historial));

            // Actualizar la interfaz
            mostrarHistorial();
        }

        function mostrarHistorial() {
            let historial = JSON.parse(localStorage.getItem('qr_history')) || [];
            
            if (historial.length === 0) {
                historialDiv.innerHTML = '<p class="no-data">No hay códigos escaneados aún.</p>';
                return;
            }

            historialDiv.innerHTML = '';
            historial.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'qr-item';
                
                // Si el texto detectado es un enlace, hacerlo cliqueable
                let contenidoHtml = item.datos;
                if (item.datos.startsWith('http://') || item.datos.startsWith('https://')) {
                    contenidoHtml = `<a href="${item.datos}" target="_blank" style="color: #2980b9;">${item.datos}</a>`;
                }

                itemDiv.innerHTML = `
                    <div><strong>Contenido:</strong> ${contenidoHtml}</div>
                    <span class="meta">📅 Escaneado el: ${item.fecha}</span>
                `;
                historialDiv.appendChild(itemDiv);
            });
        }
    </script>
</body>
</html>
