<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes y Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .swal2-popup { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-xl shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-blue-600">Panel de Control Estudiantil</h1>
                <p class="text-gray-500 text-sm">Gestión de alumnos, asistencia por QR y Backups</p>
            </div>
            <button onclick="exportarBackup()" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded-lg transition shadow-sm cursor-pointer">
                📦 Exportar Backup (.js)
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">📷 Lector QR de Asistencia</h2>
                    <div id="reader" class="w-full bg-gray-50 rounded-lg overflow-hidden border border-dashed border-gray-300"></div>
                    <p class="text-xs text-gray-400 mt-2 text-center">Escanea el DNI del estudiante para registrar entrada</p>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h2 class="text-lg font-bold mb-3">📅 Control de Fecha</h2>
                    <input type="date" id="fechaAsistencia" class="w-full p-2 border rounded-lg mb-4 text-center font-semibold text-gray-700">
                    
                    <h3 class="font-semibold text-sm text-gray-600 mb-2">Últimos Registros de Hoy:</h3>
                    <ul id="listaAsistenciaHoy" class="text-sm space-y-2 divide-y divide-gray-100 max-h-40 overflow-y-auto">
                        </ul>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">👥 Registro de Estudiantes (<span id="totalEstudiantes">0</span>)</h2>
                    <button onclick="modalAgregarEstudiante()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition cursor-pointer">
                        + Agregar
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 uppercase text-xs border-b">
                                <th class="p-3">DNI</th>
                                <th class="p-3">Estudiante</th>
                                <th class="p-3">Género</th>
                                <th class="p-3">Teléfono</th>
                                <th class="p-3 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaEstudiantes" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- BASE DE DATOS INICIAL (20 Estudiantes base solicitado) ---
        let estudiantes = [
            { dni: "74839201", nombres: "Carlos Andrés", apellidos: "Mendoza Ortiz", genero: "M", telefono: "981234567" },
            { dni: "45920183", nombres: "Ana Sofía", apellidos: "Benítez Silva", genero: "F", telefono: "945876123" },
            { dni: "10293847", nombres: "Diego Alejandro", apellidos: "Castro Rivas", genero: "M", telefono: "912345678" },
            { dni: "83746291", nombres: "Valeria Inés", apellidos: "Palacios Vega", genero: "F", telefono: "967890123" },
            { dni: "29384756", nombres: "Mateo Sebastián", apellidos: "Flores Quispe", genero: "M", telefono: "934567890" },
            { dni: "54637281", nombres: "Camila Belén", apellidos: "Paredes Luna", genero: "F", telefono: "921743658" },
            { dni: "38291047", nombres: "Lucas Gabriel", apellidos: "Vargas Machuca", genero: "M", telefono: "976543210" },
            { dni: "19283746", nombres: "Martina Paz", apellidos: "Navarro Ríos", genero: "F", telefono: "954123789" },
            { dni: "67482910", nombres: "Nicolás Eduardo", apellidos: "Jiménez Fuentes", genero: "M", telefono: "983456217" },
            { dni: "82910384", nombres: "Isabella Marie", apellidos: "Delgado Torres", genero: "F", telefono: "917283948" },
            { dni: "47382910", nombres: "Santiago José", apellidos: "Morales Gutiérrez", genero: "M", telefono: "962834715" },
            { dni: "91028374", nombres: "Valentina Luz", apellidos: "Rojas Espinoza", genero: "F", telefono: "941627384" },
            { dni: "36251478", nombres: "Matías Alonso", apellidos: "Herrera Díaz", genero: "M", telefono: "935482196" },
            { dni: "72819304", nombres: "Daniela Alejandra", apellidos: "Salazar Campos", genero: "F", telefono: "998712345" },
            { dni: "58192037", nombres: "Joaquín Ignacio", apellidos: "Cárdenas Soto", genero: "M", telefono: "924815367" },
            { dni: "20394817", nombres: "Gabriela Fernanda", apellidos: "Mendoza Reyes", genero: "F", telefono: "951364278" },
            { dni: "84736251", nombres: "Tomás Agustín", apellidos: "Miranda Cruz", font: "M", genero: "M", telefono: "973159482" },
            { dni: "12547839", nombres: "Lucía Fernanda", apellidos: "Peña Villanueva", genero: "F", telefono: "919472835" },
            { dni: "63748291", nombres: "Benjamín David", apellidos: "Solís Guerrero", genero: "M", telefono: "966284193" },
            { dni: "49382716", nombres: "Elena Beatriz", apellidos: "Franco Córdoba", genero: "F", telefono: "943715826" }
        ];

        // Historial de asistencias (Ejemplo inicial con registros)
        let asistencias = [
            { dni: "74839201", fecha: "2026-06-02", hora: "08:00" },
            { dni: "45920183", fecha: "2026-06-02", hora: "08:05" }
        ];

        // --- INICIALIZACIÓN ---
        document.addEventListener("DOMContentLoaded", () => {
            // Fijar fecha de hoy por defecto en el calendario
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fechaAsistencia').value = hoy;
            
            renderEstudiantes();
            renderAsistencias();
            initQR();

            document.getElementById('fechaAsistencia').addEventListener('change', renderAsistencias);
        });

        // --- RENDERIZADO DE TABLAS ---
        function renderEstudiantes() {
            const tbody = document.getElementById('tablaEstudiantes');
            document.getElementById('totalEstudiantes').innerText = estudiantes.length;
            tbody.innerHTML = '';

            estudiantes.forEach((est, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 font-mono font-medium">${est.dni}</td>
                        <td class="p-3 font-semibold">${est.apellidos}, ${est.nombres}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded text-xs ${est.genero==='M'?'bg-blue-100 text-blue-700':'bg-pink-100 text-pink-700'}">${est.genero}</span></td>
                        <td class="p-3 text-gray-600">${est.telefono}</td>
                        <td class="p-3 text-center space-x-1">
                            <button onclick="modalEditarEstudiante(${index})" class="text-blue-600 hover:text-blue-900 font-medium px-2 py-1 cursor-pointer">Editar</button>
                            <button onclick="eliminarEstudiante(${index})" class="text-red-600 hover:text-red-900 font-medium px-2 py-1 cursor-pointer">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderAsistencias() {
            const fechaSeleccionada = document.getElementById('fechaAsistencia').value;
            const lista = document.getElementById('listaAsistenciaHoy');
            lista.innerHTML = '';

            const filtrados = asistencias.filter(a => a.fecha === fechaSeleccionada);

            if(filtrados.length === 0) {
                lista.innerHTML = `<li class="text-gray-400 text-xs py-2 text-center">No hay registros para esta fecha.</li>`;
                return;
            }

            filtrados.forEach(asist => {
                const est = estudiantes.find(e => e.dni === asist.dni);
                const nombreCompleto = est ? `${est.apellidos}, ${est.nombres}` : "Estudiante Desconocido";
                lista.innerHTML += `
                    <li class="py-2 flex justify-between items-center text-xs">
                        <div>
                            <p class="font-semibold text-gray-700">${nombreCompleto}</p>
                            <p class="text-gray-400 font-mono">${asist.dni}</p>
                        </div>
                        <span class="bg-green-100 text-green-700 font-mono px-2 py-0.5 rounded font-bold">${asist.hora}</span>
                    </li>
                `;
            });
        }

        // --- CRUD CON SWEETALERT 2 ---
        function modalAgregarEstudiante() {
            Swal.fire({
                title: 'Nuevo Estudiante',
                html: `
                    <input id="swal-dni" class="swal2-input" placeholder="DNI" type="number">
                    <input id="swal-nombres" class="swal2-input" placeholder="Nombres">
                    <input id="swal-apellidos" class="swal2-input" placeholder="Apellidos">
                    <select id="swal-genero" class="swal2-input">
                        <option value="M">Masculino (M)</option>
                        <option value="F">Femenino (F)</option>
                    </select>
                    <input id="swal-telefono" class="swal2-input" placeholder="Teléfono">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Guardar',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const dni = document.getElementById('swal-dni').value;
                    const nombres = document.getElementById('swal-nombres').value;
                    const apellidos = document.getElementById('swal-apellidos').value;
                    const genero = document.getElementById('swal-genero').value;
                    const telefono = document.getElementById('swal-telefono').value;

                    if (!dni || !nombres || !apellidos || !telefono) {
                        Swal.showValidationMessage('Por favor llena todos los campos');
                    }
                    if (estudiantes.some(e => e.dni === dni)) {
                        Swal.showValidationMessage('Este DNI ya está registrado');
                    }
                    return { dni, nombres, apellidos, genero, telefono };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes.push(result.value);
                    renderEstudiantes();
                    Swal.fire('¡Creado!', 'El estudiante fue añadido.', 'success');
                }
            });
        }

        function modalEditarEstudiante(index) {
            const est = estudiantes[index];
            Swal.fire({
                title: 'Editar Estudiante',
                html: `
                    <input id="swal-dni" class="swal2-input" value="${est.dni}" disabled readonly style="background:#f3f4f6;">
                    <input id="swal-nombres" class="swal2-input" value="${est.nombres}" placeholder="Nombres">
                    <input id="swal-apellidos" class="swal2-input" value="${est.apellidos}" placeholder="Apellidos">
                    <select id="swal-genero" class="swal2-input">
                        <option value="M" ${est.genero==='M'?'selected':''}>Masculino (M)</option>
                        <option value="F" ${est.genero==='F'?'selected':''}>Femenino (F)</option>
                    </select>
                    <input id="swal-telefono" class="swal2-input" value="${est.telefono}" placeholder="Teléfono">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Actualizar',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const nombres = document.getElementById('swal-nombres').value;
                    const apellidos = document.getElementById('swal-apellidos').value;
                    const genero = document.getElementById('swal-genero').value;
                    const telefono = document.getElementById('swal-telefono').value;

                    if (!nombres || !apellidos || !telefono) {
                        Swal.showValidationMessage('Por favor llena todos los campos');
                    }
                    return { dni: est.dni, nombres, apellidos, genero, telefono };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes[index] = result.value;
                    renderEstudiantes();
                    renderAsistencias(); // Por si cambió el nombre y ya tenía asistencia
                    Swal.fire('¡Actualizado!', 'Datos modificados correctamente.', 'success');
                }
            });
        }

        function eliminarEstudiante(index) {
            Swal.fire({
                title: '¿Estás seguro?',
                text: `Vas a eliminar a ${estudiantes[index].nombres}. Esta acción no se puede deshacer.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes.splice(index, 1);
                    renderEstudiantes();
                    Swal.fire('Eliminado', 'El estudiante ha sido removido.', 'success');
                }
            });
        }

        // --- GESTIÓN DE ASISTENCIA QR ---
        function registrarAsistenciaPorDni(dniEscaneado) {
            const estudiante = estudiantes.find(e => e.dni === dniEscaneado);
            const fechaActual = document.getElementById('fechaAsistencia').value;
            const horaActual = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            if (!estudiante) {
                Swal.fire({ title: 'Error', text: `El DNI ${dniEscaneado} no pertenece a ningún estudiante.`, icon: 'error', timer: 3000 });
                return;
            }

            // Validar si ya asistió hoy
            const yaRegistrado = asistencias.some(a => a.dni === dniEscaneado && a.fecha === fechaActual);
            if (yaRegistrado) {
                Swal.fire({ title: 'Aviso', text: `${estudiante.nombres} ya registró asistencia hoy.`, icon: 'info', timer: 2500 });
                return;
            }

            // Registrar
            asistencias.unshift({ dni: dniEscaneado, fecha: fechaActual, hora: horaActual });
            renderAsistencias();

            Swal.fire({
                title: 'Asistencia Registrada',
                text: `${estudiante.apellidos}, ${estudiante.nombres}`,
                icon: 'success',
                timer: 2000,
                showConfirmButton: false
            });
        }

        function initQR() {
            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            });

            function onScanSuccess(decodedText, decodedResult) {
                // El texto decodificado debe ser el DNI del alumno
                registrarAsistenciaPorDni(decodedText.trim());
            }

            html5QrcodeScanner.render(onScanSuccess);
        }

        // --- BACKUP EXPORTABLE (.JS) ---
        function exportarBackup() {
            const datosBackup = {
                fechaBackup: new Date().toISOString(),
                estudiantes: estudiantes,
                asistencias: asistencias
            };

            // Convertir a string de código JS ejecutable/legible
            const contenidoArchivo = `// Backup del Sistema de Asistencias\nconst BACKUP_DATA = ${JSON.stringify(datosBackup, null, 4)};`;
            
            const blob = new Blob([contenidoArchivo], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_asistencias_${new Date().toISOString().split('T')[0]}.js`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
